name: Publish

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # setup-node points .npmrc auth at npmjs.org for the publish; the proto
      # dependency still resolves from GitHub Packages, so append its token.
      - name: Authenticate to GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - run: npm ci
      # `prepublishOnly` (check + lint + format:check + test + build) runs as
      # part of publish — the full release gate executes against the exact
      # tree being published.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Notify in-org SDK consumer (event-driven bump) ──────────────────
  # After the public-npm publish, dispatch sdk-released {version, ecosystem}
  # to macp-playground, whose bump-sdk.yml opens the bump PR. Zero-PAT.
  dispatch-playground:
    name: Dispatch sdk-released to macp-playground
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - name: Mint GitHub App token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.MACP_BOT_APP_ID }}
          private-key: ${{ secrets.MACP_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: macp-playground

      - name: Dispatch sdk-released
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          V="${VERSION#v}"
          jq -nc --arg v "$V" '{event_type:"sdk-released",client_payload:{version:$v,ecosystem:"npm"}}' \
            | gh api -X POST "repos/$OWNER/macp-playground/dispatches" --input -
          echo "dispatched sdk-released {version=$V, ecosystem=npm} -> macp-playground"
