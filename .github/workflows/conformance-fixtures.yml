name: Conformance fixtures

# Enforces zero drift between this SDK's vendored conformance fixtures and the
# canonical set in the spec repo (multiagentcoordinationprotocol). Runs on every
# PR/push so a hand-edited fixture can never merge. See
# tests/conformance/ and `make sync-fixtures` / `make verify-fixtures`.
#
# If the spec repo is private, configure a read-scoped PAT as the
# CONFORMANCE_SPEC_TOKEN secret; otherwise the default GITHUB_TOKEN is used.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out SDK
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check out canonical spec
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: multiagentcoordinationprotocol/multiagentcoordinationprotocol
          path: _spec
          token: ${{ secrets.CONFORMANCE_SPEC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Verify fixtures match canonical (no drift)
        run: make verify-fixtures SPEC_CONFORMANCE_DIR="$GITHUB_WORKSPACE/_spec/schemas/conformance"

      - name: Lint canonical fixtures for internal consistency
        run: python3 "$GITHUB_WORKSPACE/_spec/schemas/conformance/lint_fixtures.py"
