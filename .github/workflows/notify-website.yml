name: Notify Website of Doc Changes

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'

# The dispatch uses its own PAT (WEBSITE_SYNC_TOKEN); GITHUB_TOKEN needs nothing.
permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website sync
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          repository: multiagentcoordinationprotocol/website
          event-type: docs-updated
