name: bump proto
on:
  repository_dispatch:
    types: [proto-released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit @multiagentcoordinationprotocol/proto version (blank = event payload / latest)'
        required: false
        default: ''
jobs:
  bump:
    uses: multiagentcoordinationprotocol/macp-ci/.github/workflows/bump-consume.yml@v1
    with:
      ecosystem: npm-ghpackages
      package: '@multiagentcoordinationprotocol/proto'
      version: ${{ github.event.inputs.version }}
    secrets: inherit
