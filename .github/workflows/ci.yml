name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on PRs; never cancel main pushes mid-run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      # Required by the coverage-report step to post/update the PR comment.
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@multiagentcoordinationprotocol'
          cache: npm
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run check
      - run: npm run lint
      - run: npm run format:check
      # Runs the unit + conformance suites AND enforces the coverage
      # thresholds set in vitest.config.ts. If coverage drops below the floor,
      # this step fails the build.
      - run: npm run test:coverage
      - run: npm run build
      # Post the coverage summary as a sticky PR comment (one matrix leg only).
      # `always()` so the numbers still land when the threshold gate fails —
      # that is exactly when they matter most. Degrades to the job summary on
      # fork PRs where GITHUB_TOKEN is read-only.
      - name: Coverage report
        if: always() && matrix.node-version == 22 && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        continue-on-error: true
