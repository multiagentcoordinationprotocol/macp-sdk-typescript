version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major-updates:
        update-types: [major]
    ignore:
      # @…/proto resolves from GitHub Packages (needs a DEPENDABOT_GHPR_TOKEN
      # registry PAT); proto bumps are event-driven, so ignore here.
      - dependency-name: '@multiagentcoordinationprotocol/proto'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
